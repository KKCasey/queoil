<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicians - Queoil</title>
</head>
<body>

    <h1>Musicians</h1>

    <form action="/musicians" method="get">
        <input type="text" name="search" placeholder="Search musicians..." th:value="${search}">
        <button type="submit">Search</button>
    </form>

    <br>

    <ul>
        <li th:each="user : ${users}">
            <a th:href="@{/musicians/{id}(id=${user.id})}" th:text="${user.username}"></a>

            <span th:if="${user.liveNow}" style="color: red; font-weight: bold;">
                - LIVE NOW
            </span>

            <span th:if="${user.liveNow and user.activeSetlist != null}">
                (Setlist:
                <a th:href="@{/setlists/{id}(id=${user.activeSetlist.id})}"
                th:text="${user.activeSetlist.title}"></a>)
            </span>
        </li>
    </ul>

    <br>
    <a href="/">Back to Home</a>

</body>
</html>
