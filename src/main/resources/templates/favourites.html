<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favourites - Queoil</title>
</head>
<body>

    <h1>My Favourite Musicians</h1>

    <ul>
        <li th:each="fav : ${favourites}">
            <a th:href="@{/musicians/{id}(id=${fav.musician.id})}"
            th:text="${fav.musician.username}"></a>

            <span th:if="${fav.musician.liveNow}" style="color: red; font-weight: bold;">
                - LIVE NOW
            </span>

            <span th:if="${fav.musician.liveNow and fav.musician.activeSetlist != null}">
                (Setlist:
                <a th:href="@{/setlists/{id}(id=${fav.musician.activeSetlist.id})}"
                th:text="${fav.musician.activeSetlist.title}"></a>)
            </span>
        </li>
    </ul>

    <p th:if="${#lists.isEmpty(favourites)}">You have not followed any musicians yet.</p>

    <br>
    <a href="/listener-dashboard">Back to Dashboard</a>
    <br><br>
    <a href="/">Back to Home</a>

</body>
</html>
