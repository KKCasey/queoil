<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Live - Queoil</title>
</head>
<body>

    <h1>Go Live</h1>

    <p style="color: red;" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form action="/live/start" method="post">
        <label>Select Setlist:</label><br>
        <select name="setlistId" required>
            <option th:each="setlist : ${setlists}"
                    th:value="${setlist.id}"
                    th:text="${setlist.title}">
            </option>
        </select><br><br>

        <button type="submit">Go Live</button>
    </form>

    <br>
    <form action="/live/end" method="post">
        <button type="submit">Show Ended</button>
    </form>

    <br>
    <a href="/musician-dashboard">Back to Dashboard</a>
</body>
</html>
