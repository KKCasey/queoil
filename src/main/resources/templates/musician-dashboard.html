<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musician Dashboard - Queoil</title>
</head>
<body>
    <h1>Musician Dashboard</h1>

    <p>Welcome, <span th:text="${user.username}"></span>!</p>
    <p style="color: green;" th:if="${successMessage}" th:text="${successMessage}"></p>

    <p th:if="${user.liveNow}" style="color: red;">
        LIVE NOW with setlist: <span th:text="${user.activeSetlist != null ? user.activeSetlist.title : 'None'}"></span>
    </p>

    <ul>
        <li><a href="/my-setlists">View My Setlists</a></li>
        <li><a href="/setlists/create-ui">Create Setlist</a></li>
        <li><a href="/songs/create-ui">Add Song</a></li>
        <li><a href="/live">Go Live / Show Ended</a></li>
        <li><a href="/requests">View Song Requests</a></li>
        <li><a href="/musicians">Browse Musicians</a></li>
        <li><a href="/profile">My Profile</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</body>
</html>
