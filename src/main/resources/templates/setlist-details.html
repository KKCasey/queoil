<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setlist Details - Queoil</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1 th:text="${setlist.title}"></h1>

        <h2>Songs</h2>

        <ul>
            <li th:each="song : ${songs}">
                <span th:text="${song.title}"></span>

                <form th:if="${loggedInUser != null and loggedInUser.role == 'LISTENER' and requestAllowed}"
                      th:action="@{/requests/create}" method="post" style="display:inline;">
                    <input type="hidden" name="songId" th:value="${song.id}">
                    <button type="submit">Request Song</button>
                </form>
            </li>
        </ul>

        <div class="nav-links">
            <a class="button" th:if="${loggedInUser != null and loggedInUser.role == 'LISTENER'}" href="/listener-dashboard">Back to Dashboard</a>
            <a class="button" th:if="${loggedInUser != null and loggedInUser.role == 'MUSICIAN'}" href="/musician-dashboard">Back to Dashboard</a>
            <a class="button" th:href="@{/musicians/{id}(id=${setlist.user.id})}">Back to Musician</a>
            <a class="button" href="/">Back to Home</a>
        </div>
    </div>
</body>
</html>
