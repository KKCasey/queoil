<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Queoil</title>
</head>
<body>

    <h1>My Profile</h1>

    <p style="color: green;" th:if="${successMessage}" th:text="${successMessage}"></p>
    <p style="color: red;" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <p><strong>Username:</strong> <span th:text="${user.username}"></span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
    <p><strong>Role:</strong> <span th:text="${user.role}"></span></p>

    <h2>Update Password</h2>
    <form action="/profile/update-password" method="post">
        <label>New Password:</label><br>
        <input type="password" name="password" required><br><br>
        <button type="submit">Update Password</button>
    </form>

    <h2>Delete Account</h2>
    <form action="/profile/delete" method="post">
        <button type="submit" onclick="return confirm('Are you sure you want to delete your account?');">
            Delete Account
        </button>
    </form>

    <br>
    <a href="/">Back to Home</a>
    <br><br>
    <a href="/logout">Logout</a>

</body>
</html>
