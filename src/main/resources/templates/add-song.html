<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Song - Queoil</title>
</head>
<body>

    <h1>Add Song</h1>

    <p style="color: red;" th:if="${errorMessage}" th:text="${errorMessage}"></p>

    <form action="/songs/create-ui" method="post">
        <label>Select Setlist:</label><br>
        <select name="setlistId" required>
            <option th:each="setlist : ${setlists}"
                    th:value="${setlist.id}"
                    th:text="${setlist.title}">
            </option>
        </select><br><br>

        <label>Song Title:</label><br>
        <input type="text" name="title" required><br><br>

        <button type="submit">Add Song</button>
    </form>

    <br>
    <a href="/musician-dashboard">Back to Dashboard</a>
    <br><br>
    <a href="/">Back to Home</a>

</body>
</html>
