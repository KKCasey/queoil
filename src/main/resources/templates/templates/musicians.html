<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicians - Queoil</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Musicians</h1>

        <!-- Search Form -->
        <form method="get" action="/musicians">
            <label for="search">Search Musicians:</label>
            <input type="text" id="search" name="search" th:value="${search}">
            <input type="submit" value="Search">
        </form>

        <h3>Available Musicians</h3>

        <ul>
            <li th:each="user : ${users}">
                <a th:href="@{'/musicians/' + ${user.id}}">
                    <span th:text="${user.username}"></span>
                </a>
            </li>
        </ul>

        <div class="nav-links">
            <a class="button" href="/listener-dashboard">Back to Dashboard</a>
            <a class="button" href="/profile">My Profile</a>
            <a class="button" href="/logout">Logout</a>
        </div>
    </div>
</body>
</html>
